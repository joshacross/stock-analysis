server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Proxy /api/* to backend (Docker Compose service name = "backend")
  # No trailing slash on proxy_pass so full URI (e.g. /api/chat) is passed unchanged.
  location /api/ {
    proxy_pass http://backend:8888;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 10s;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    # Required for SSE/streaming (e.g. /api/chat)
    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding on;
  }

  # SPA fallback – must come after /api/ so API is not served as static
  location / {
    try_files $uri $uri/ /index.html;
  }
}
